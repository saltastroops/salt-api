name: Test

on: ["push", "pull_request"]

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Change directory
        run: cd cypress

      - name: Clone test data repository
        env:
          TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: git clone https://${TOKEN}@github.com/saltastroops/salt-testdata

#      - name: Clone test data repository
#        run: git clone https://github.com/saltastroops/salt-testdata.git

      - name: Change directory
        run: cd ../

        # Install NPM dependencies, cache them correctly
        # and run all Cypress tests
      - name: Run Cypress Test
        uses: cypress-io/github-action@v4
        with:
          start: npm start

        env:
          recordHttpConfig: '{"mockFilesDirectory":"cypress/salt-testdata/web-manager/"}'
          # Recommended: pass the GitHub token lets this action correctly
          # determine the unique run id necessary to re-run the checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Angular Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Lint
        run: |
          npx eslint -c .eslintrc.json
          npx prettier --check .
