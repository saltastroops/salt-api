name: Test

on: ["push", "pull_request"]

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 12

      #      - name: Shutdown Ubuntu MySQL (SUDO)
      #        run: sudo service mysql stop # Shutdown the Default MySQL, "sudo" is necess

      - name: Install packages
        run: npm install

      - name: Clone test data repository
        env:
          TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: git clone https://${TOKEN}@github.com/saltastroops/salt-testdata cypress/salt-testdata

      #      - name: Run Angular Tests
      #        run: npm test -- --watch=false --browsers=ChromeHeadless

      # Install NPM dependencies, cache them correctly
      # and run all Cypress tests
      #      - name: Set up MySQL
      #        uses: shogo82148/actions-setup-mysql@v1
      #        with:
      #            mysql-version: '8.0'
      #      - run: |
      #          mysql -uroot -h127.0.0.1 -e "SELECT version(); ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'password'"
      #          touch .env
      #          echo TEST_DATABASE=mysql+pymysql://root:password@127.0.0.1:3306/test >> .env

      - name: Export Cypress env variables
        run: |
          export CYPRESS_apiUrl="http://127.0.0.1:8001"
          export CYPRESS_recordHttpConfig="{"mockFilesDirectory":"cypress/salt-testdata/web-manager/","mockIntercepts":true}"
          export CYPRESS_grepTags="-@skip"

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v4
        with:
          start: npm start
          wait-on: "http://localhost:4200"
        env:
#          CYPRESS_apiUrl: "http://127.0.0.1:8001"
#          CYPRESS_recordHttpConfig: '{"mockFilesDirectory":"cypress/salt-testdata/web-manager/","mockIntercepts":true}'
#          CYPRESS_grepTags: -@skip
          # Recommended: pass the GitHub token lets this action correctly
          # determine the unique run id necessary to re-run the checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: |
          npx eslint -c .eslintrc.json
          npx prettier --check .
