name: Test

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 12

      - name: Install packages
        run: npm ci

      - name: Lint
        run: |
          npx eslint -c .eslintrc.json
          npx prettier --check .

      - name: Clone test data repository
        uses: actions/checkout@master
        with:
          repository: saltastroops/salt-testdata
          path: ./salt-testdata
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Run Angular Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v4
        env:
          CYPRESS_apiUrl: /api/
          CYPRESS_recordHttpConfig: '{"mockFilesDirectory":"./salt-testdata/web-manager/e2e/","mockIntercepts":true}'
          CYPRESS_grepTags: -@skip
          TEST_DATA_DIR: ./salt-testdata/web-manager
          HTTP_PROXY: api
          # Recommended: pass the GitHub token lets this action correctly
          # determine the unique run id necessary to re-run the checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          install: false
          start: npm start
          wait-on: "http://localhost:4200"
