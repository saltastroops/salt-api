<div class="table alternate-background">
  <div class="row secondary-header conditions-header-main">
    <div class="has-text-centered">Iterations</div>
  </div>
  <div class="row has-two-columns">
    <div>Wait</div>
    <div>{{ block.waitPeriod }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Visits</div>
    <div>{{ block.requestedObservations }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Attempted</div>
    <div>{{ rejectedObservations }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Done</div>
    <div>{{ acceptedObservations }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Shutter open time</div>
    <div>{{ block.observationTime - block.overheadTime }}</div>
  </div>
</div>
