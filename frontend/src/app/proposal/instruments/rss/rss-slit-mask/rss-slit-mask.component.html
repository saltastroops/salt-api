<div class="table alternate-background" *ngIf="slitMask">
  <div class="secondary-header row">
    <div class="has-text-centered">Slit mask</div>
  </div>
  <div class="row has-two-columns">
    <div>Type</div>
    <div>{{ slitMask.maskType }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Description</div>
    <div>{{ slitMask.description }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Barcode</div>
    <div>{{ slitMask.barcode }}</div>
  </div>
</div>
