<div class="table alternate-background">
  <div class="row secondary-header">
    <div class="has-text-centered">Observation times</div>
  </div>
  <div class="row has-two-columns">
    <div>Shutter open time</div>
    <div>{{ salticam.observationTime - salticam.overheadTime }} sec</div>
  </div>
  <div class="row has-two-columns">
    <div>Overhead</div>
    <div>{{ salticam.overheadTime }} sec</div>
  </div>
  <div class="row has-two-columns">
    <div>Charged</div>
    <div>{{ salticam.observationTime }} sec</div>
  </div>
</div>
