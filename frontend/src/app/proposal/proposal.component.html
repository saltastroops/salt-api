<div *ngIf="proposal | async as p">
  <h1 class="title is-1">{{ proposalCode }}</h1>
  <hr class="heading-line proposal-header" />

  <div class="block">
    <wm-general-proposal-info
      [generalProposalInfo]="p.generalInfo"
      [currentSemester]="p.semester"
      [phase]="p.phase"
      [proposalCode]="p.proposalCode"
    ></wm-general-proposal-info>
  </div>

  <div class="block">
    <wm-proposal-details
      [generalProposalInfo]="p.generalInfo"
    ></wm-proposal-details>
  </div>

  <div class="block">
    <wm-time-allocation-table
      [time_allocations]="p.timeAllocations"
    ></wm-time-allocation-table>
  </div>

  <div class="block charged-and-progress">
    <!--    TODO Please note that time allocations are semester dependent this needs to be fixed to selected semester. -->
    <wm-charged-time
      [chargedTime]="p.chargedTime"
      [timeAllocation]="p.timeAllocations[0]"
    ></wm-charged-time>

    <wm-proposal-progress-table
      [proposalProgress]="'TO BE IMPLEMENTED'"
    ></wm-proposal-progress-table>
  </div>

  <div class="block">
    <wm-investigators [investigators]="p.investigators"></wm-investigators>
  </div>

  <div class="block">
    <wm-proposal-comments
      [observationComments]="[
        { comment: 'n/a', author: 'n/a', madeAt: '2021-07-18T06:07:08' }
      ]"
    ></wm-proposal-comments>
  </div>

  <div class="block">
    <wm-block-summaries
      [blocks]="p.blocks"
      [proposalCode]="p.proposalCode"
    ></wm-block-summaries>
  </div>

  <div class="block">
    <wm-summary-of-executed-observations
      [executedObservations]="p.executedObservations"
    ></wm-summary-of-executed-observations>
  </div>

  <!--  TODO: Allocation is semester dependent will fix it -->

  <wm-block-view [blocks]="p.blocks"></wm-block-view>

  <wm-hrs></wm-hrs>
</div>
