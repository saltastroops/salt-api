<div class="forgot-password">
  <div *ngIf="!showSuccessMessage">
    <h2 class="title is-3">Forgot password</h2>
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="forgotPassword()">
      <div class="form-group">
        <label class="label">Username or email</label>
        <input
          (ngModelChange)="clearError()"
          type="text"
          formControlName="usernameEmail"
          class="input is-danger"
          data-test="username-email"
          [ngClass]="{ 'is-danger': submitted && f.usernameEmail.errors }"
        />
        <div
          *ngIf="(submitted || f.usernameEmail.dirty) && f.usernameEmail.errors"
          class="invalid-feedback"
        >
          <div
            *ngIf="f.usernameEmail.errors.required"
            class="has-text-danger"
            data-test="error"
          >
            Username or email is required
          </div>
        </div>
      </div>
      <div class="form-group">
        <button
          class="button is-primary {{ loading ? 'is-loading' : '' }}"
          data-test="submit-request"
        >
          Request
        </button>
        <div *ngIf="error">
          <p class="has-text-danger" data-test="error">{{ error }}</p>
        </div>
      </div>
    </form>
  </div>
  <article *ngIf="showSuccessMessage" class="message is-success">
    <div class="message-body">
      <p data-test="success">
        An email with a password reset link has been sent. Please follow the
        link in the email.
      </p>
      <p>
        <a class="is-link" data-test="request-again" (click)="requestAgain()"
          >Request the email again.</a
        >
      </p>
    </div>
  </article>
</div>
