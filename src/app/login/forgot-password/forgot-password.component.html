<div class="forgot-password">
  <div *ngIf="!switchForm">
    <h2 class="title is-3">Forgot password</h2>
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="forgotPassword()">
      <div class="form-group">
        <label class="label">Username or email</label>
        <input
          (ngModelChange)="clearError()"
          type="text"
          formControlName="usernameEmail"
          class="input is-danger"
          [ngClass]="{ 'is-danger': submitted && f.usernameEmail.errors }"
        />
        <div
          *ngIf="submitted && f.usernameEmail.errors"
          class="invalid-feedback"
        >
          <div *ngIf="f.usernameEmail.errors.required" class="has-text-danger">
            Username or email is required
          </div>
        </div>
      </div>
      <div class="form-group">
        <button class="button is-primary {{ loading ? 'is-loading' : '' }}">
          Request
        </button>
        <div *ngIf="error">
          <p class="has-text-danger">{{ error }}</p>
        </div>
      </div>
    </form>
  </div>
  <div *ngIf="switchForm">
    <h5 class="title is-5">
      Email has been sent with the reset password link. Please follow the link
      in your email
    </h5>
    <div class="has-two-columns buttons">
      <div>
        <button class="button is-success" (click)="toLogin()">Login</button>
      </div>
      <div>
        <button class="button is-primary" (click)="requestAgain()">
          Request Again
        </button>
      </div>
    </div>
  </div>
</div>
