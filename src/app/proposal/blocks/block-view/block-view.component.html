<wm-block-selection
  [blocks]="blocks"
  [selectedBlock]="selectedBlock"
  (selectEmitter)="selectBlock($event)"
></wm-block-selection>
<div data-test="block-content" class="block-content" style="position: relative">
  <ng-container *ngIf="isLoading">
    <div class="is-overlay loading-spinner" data-testid="block-view-loading">
      <wm-loading-spinner></wm-loading-spinner>
    </div>
  </ng-container>
  <ng-container *ngIf="error">
    <div class="message is-danger">
      <div class="message-header">Error</div>
      <div class="message-body">{{ error }}</div>
    </div>
  </ng-container>
  <ng-container *ngIf="displayedBlock">
    <div [class.is-blurred]="isLoading">
      <div data-test="displayed-block-content" class="block">
        <wm-block [block]="displayedBlock"></wm-block>
      </div>
    </div>
  </ng-container>
</div>
<wm-block-selection
  [blocks]="blocks"
  [selectedBlock]="selectedBlock"
  (selectEmitter)="selectBlock($event)"
></wm-block-selection>
