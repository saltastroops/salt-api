<div *ngIf="isModalActive">
  <form>
    <div
      data-test="block-status-modal"
      class="modal"
      [ngClass]="isModalActive ? 'is-active' : ''"
    >
      <div class="modal-background" (click)="closeModal()"></div>
      <div class="modal-card">
        <header class="modal-card-head">
          <p class="modal-card-title">Edit block status</p>
          <button
            class="delete"
            aria-label="close"
            (click)="closeModal()"
          ></button>
        </header>
        <div
          class="modal-card-body"
          [formGroup]="editBlockStatusForm"
          (ngSubmit)="submitBlockStatus()"
        >
          <div class="form-group input-section">
            <label class="label">Block status</label>
            <select
              #status
              (ngModelChange)="clearError()"
              formControlName="blockStatus"
              data-test="block-status-value"
            >
              <option selected="selected" disabled="disabled" value="null">
                Please select a status
              </option>
              <option value="Active">Active</option>
              <option value="On hold">On hold</option>
            </select>
            <div
              *ngIf="f.blockStatus.touched && f.blockStatus.value === null"
              class="invalid-feedback"
            >
              <div class="has-text-danger" data-test="error">
                The block status is required
              </div>
            </div>
          </div>
          <div class="form-group input-section">
            <label class="label">Block status reason</label>
            <input
              (ngModelChange)="clearError()"
              type="text"
              formControlName="statusReason"
              class="input"
              data-test="block-status-reason"
            />
          </div>
          <div class="modal-card-foot">
            <input
              type="submit"
              class="button is-small is-primary"
              [ngClass]="{ 'is-loading': loading }"
              value="Submit"
              (click)="submitBlockStatus()"
              data-test="submit-block-status"
            />
            <input
              type="button"
              class="button is-small is-danger ml-4"
              value="Cancel"
              (click)="closeModal()"
            />
          </div>
          <div *ngIf="submissionError" class="invalid-feedback">
            <div class="has-text-danger" data-test="error">
              {{ submissionError }}
            </div>
          </div>
        </div>
      </div>
      <button
        class="modal-close is-large"
        aria-label="close"
        (click)="closeModal()"
      ></button>
    </div>
  </form>
</div>
