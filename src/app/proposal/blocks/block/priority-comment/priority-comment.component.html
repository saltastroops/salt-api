<div>
  <table class="table">
    <thead>
      <tr>
        <th>Priority</th>
        <th>Comments</th>
        <th>Edit</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>{{ block.priority }}</td>
        <td>
          <p [innerHTML]="block.comment | nl2br"></p>
        </td>
        <td class="has-text-centered">
          <button class="button">Edit block</button>
        </td>
      </tr>
      <tr>
        <td colspan="3">
          The block was last submitted with major changes on
          {{ latestSubmissionDate | dfnsFormat: "dd LLLL yyyy" }}.
        </td>
      </tr>
    </tbody>
  </table>
</div>
