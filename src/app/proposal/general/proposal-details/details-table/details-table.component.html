<wm-edit-proprietary-period-modal
  #proprietaryPeriodModal
  (updatePeriod)="onProprietaryPeriodUpdate($event)"
></wm-edit-proprietary-period-modal>
<div>
  <table class="table">
    <thead>
      <tr class="secondary-header">
        <th colspan="2" class="has-text-centered">Details</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>Status</th>
        <td>
          <wm-proposal-status [proposal]="proposal"></wm-proposal-status>
        </td>
      </tr>
      <tr *ngIf="proposal.generalInfo.status.comment">
        <th>Status Comment</th>
        <td>{{ proposal.generalInfo.status.comment }}</td>
      </tr>
      <tr>
        <th>Type</th>
        <td>{{ proposal.generalInfo.proposalType }}</td>
      </tr>
      <tr>
        <th>Target of Opportunity</th>
        <td *ngIf="proposal.generalInfo.isTargetOfOpportunity">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_tick_2836262-green.svg"
              alt="Is target of opportunity"
            />
          </div>
        </td>
        <td *ngIf="!proposal.generalInfo.isTargetOfOpportunity">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_Cross_2120375.svg"
              alt="Is not target of opportunity"
            />
          </div>
        </td>
      </tr>
      <tr>
        <th>Total time</th>
        <td>{{ proposal.generalInfo.totalRequestedTime }}</td>
      </tr>
      <tr>
        <th>Proprietary period</th>
        <td class="proprietary-period">
          {{ releaseDate | dfnsFormat: "d MMMM yyyy" }}
          <button
            (click)="
              proprietaryPeriodModal.openModal(
                proposal.generalInfo.proprietaryPeriod,
                proposal.proposalCode
              )
            "
            class="button is-pulled-right"
          >
            Change
          </button>
        </td>
      </tr>
      <tr *ngIf="isAdminOrSa">
        <th colspan="2">
          <wm-self-activate
            [proposalCode]="proposal.proposalCode"
            [isSelfActivatable]="isSelfActivatable"
          ></wm-self-activate>
        </th>
      </tr>
    </tbody>
  </table>
</div>
