        <tr class="secondary-header">
          <th colspan="2" class="has-text-centered">Download</th>
        </tr>

          <td colspan="2">
            <a class="has-text-link" [href]="zipDownloadLink()"

    </div>
    <div>
      <wm-liaison-astronomer [proposal]="proposal"></wm-liaison-astronomer>
    </div>
  </div>



</div>
