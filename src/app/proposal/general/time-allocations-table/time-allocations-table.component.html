<div>
  <table class="table is-bordered is-fullwidth">
    <thead>
      <tr class="headers">
        <th colspan="7" class="has-text-centered">Time Allocation</th>
      </tr>
      <tr class="secondary-header">
        <th>Partner</th>
        <th>Priority 0</th>
        <th>Priority 1</th>
        <th>Priority 2</th>
        <th>Priority 3</th>
        <th>Priority 4</th>
        <th>TAC Comment</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of time_allocations">
        <td>{{ a.partnerName }}</td>
        <td>{{ a.priority0 }} sec</td>
        <td>{{ a.priority1 }} sec</td>
        <td>{{ a.priority2 }} sec</td>
        <td>{{ a.priority3 }} sec</td>
        <td>{{ a.priority4 }} sec</td>
        <td *ngIf="!!a.tacComment">
          <span class="has-text-link" tooltip="{{ a.tacComment }}">
            Show comment
          </span>
        </td>
        <td *ngIf="!a.tacComment">
          <span>No comment</span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
