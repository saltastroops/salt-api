<div>
  <table class="table">
    <tr class="secondary-header">
      <th colspan="2" class="has-text-centered">General</th>
    </tr>
    <tr>
      <th>Cycles</th>
      <td class="has-text-right">
        {{ nir.procedure.cycles }}
      </td>
    </tr>
    <tr>
      <th>Total Exp. Time</th>
      <td class="has-text-right">
        {{ nir.observationTime - nir.overheadTime | number: "1.2-2" }} seconds
      </td>
    </tr>
    <tr>
      <th>Overhead</th>
      <td class="has-text-right">
        {{ nir.overheadTime | number: "1.2-2" }} seconds
      </td>
    </tr>
    <tr>
      <th>Charged</th>
      <td class="has-text-right">
        {{ nir.observationTime | number: "1.2-2" }} seconds
      </td>
    </tr>
  </table>
</div>
