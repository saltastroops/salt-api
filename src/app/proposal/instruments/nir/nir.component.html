<h2 class="title is-3">
  NIR {{ payloadConfiguration.payloadConfigurationType }} Configuration
</h2>
<hr class="heading-line hrs-header" />
<div>
  <div class="has-two-columns">
    <wm-nir-general-info [nir]="nir"></wm-nir-general-info>
    <wm-nir-configuration
      *ngIf="nir.configuration"
      [nirConfiguration]="nir.configuration"
    ></wm-nir-configuration>
    <wm-nir-calibration
      *ngIf="payloadConfiguration.lamp"
      [filter]="payloadConfiguration.calibrationFilter"
      [lamp]="payloadConfiguration.lamp"
    ></wm-nir-calibration>
  </div>
  <div *ngIf="nir.procedure">
    <wm-nir-dither-steps
      [nirDitherSteps]="nir.procedure.ditherPattern"
    ></wm-nir-dither-steps>
  </div>
</div>
