<table class="table is-bordered is-fullwidth">
  <thead>
    <tr class="headers">
      <th colspan="2" class="has-text-centered">Etalon config</th>
    </tr>
    <tr class="secondary-header">
      <th>#</th>
      <th>Wavelength</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let e of etalonConfiguration; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ e }} Å</td>
    </tr>
  </tbody>
</table>
