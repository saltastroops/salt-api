<div>
  <table class="table">
    <tr class="secondary-header">
      <th colspan="2" class="has-text-centered">General</th>
    </tr>
    <tr>
      <th>Cycles</th>
      <td class="has-text-right">
        {{ rss.procedure.cycles }}
      </td>
    </tr>
    <tr>
      <th>Total Exp. time</th>
      <td class="has-text-right">
        {{ rss.observationTime - rss.overheadTime | number: "1.2-2" }} sec
      </td>
    </tr>
    <tr>
      <th>Overhead</th>
      <td class="has-text-right">
        {{ rss.overheadTime | number: "1.2-2" }} sec
      </td>
    </tr>
    <tr>
      <th>Charged</th>
      <td class="has-text-right">
        {{ rss.observationTime | number: "1.2-2" }} sec
      </td>
    </tr>
  </table>
</div>
