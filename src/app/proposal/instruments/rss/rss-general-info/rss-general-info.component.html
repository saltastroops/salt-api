<div class="table alternate-background">
  <div class="row secondary-header">
    <div class="has-text-centered">General</div>
  </div>
  <div class="row has-two-columns">
    <div>Cycles</div>
    <div class="has-text-right">{{ rss.procedure.cycles }}</div>
  </div>
  <div class="row has-two-columns">
    <div>Total Exp. Time</div>
    <div class="has-text-right">
      {{ rss.observationTime - rss.overheadTime }} sec
    </div>
  </div>
  <div class="row has-two-columns">
    <div>Overhead</div>
    <div class="has-text-right">{{ rss.overheadTime }} sec</div>
  </div>
  <div class="row has-two-columns">
    <div>Charged</div>
    <div class="has-text-right">{{ rss.observationTime }} sec</div>
  </div>
</div>
