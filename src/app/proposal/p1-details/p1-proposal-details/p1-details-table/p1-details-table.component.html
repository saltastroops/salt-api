<wm-p1-proposal-status-modal
  #proposalStatusModal
  [proposal]="proposal"
  (proposalStatusUpdate)="updateProposalStatus($event)"
>
</wm-p1-proposal-status-modal>
<div>
  <table class="table">
    <tr class="secondary-header">
      <th colspan="2" class="has-text-centered">Details</th>
    </tr>
    <tbody>
      <tr>
        <th>Status</th>
        <td>
          <div>
            {{ proposal.generalInfo.status.value }}
          </div>
          <button
            class="button is-pulled-right"
            *ngIf="isAdminOrSa"
            (click)="
              proposalStatusModal.openProposalStatusCommentModal(
                proposal.generalInfo.status.value,
                proposal.generalInfo.status.comment
              )
            "
          >
            Change
          </button>
        </td>
      </tr>
      <tr *ngIf="proposal.generalInfo.status.comment">
        <th>Status comment</th>
        <td>{{ proposal.generalInfo.status.comment }}</td>
      </tr>
      <tr>
        <th>Target of Opportunity</th>
        <td *ngIf="proposal.generalInfo.isTargetOfOpportunity">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_tick_2836262-green.svg"
              alt="Is target of opportunity"
            />
          </div>
        </td>
        <td *ngIf="!proposal.generalInfo.isTargetOfOpportunity">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_Cross_2120375.svg"
              alt="Is not target of opportunity"
            />
          </div>
        </td>
      </tr>
      <tr>
        <th>Time Restricted</th>
        <td *ngIf="proposal.generalInfo.isTimeRestricted">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_tick_2836262-green.svg"
              alt="Is target of opportunity"
            />
          </div>
        </td>
        <td *ngIf="!proposal.generalInfo.isTimeRestricted">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_Cross_2120375.svg"
              alt="Is not target of opportunity"
            />
          </div>
        </td>
      </tr>
      <tr>
        <th>Priority 4</th>
        <td *ngIf="proposal.generalInfo.isP4">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_tick_2836262-green.svg"
              alt="Is target of opportunity"
            />
          </div>
        </td>
        <td *ngIf="!proposal.generalInfo.isP4">
          <div>
            <img
              class="icon is-small"
              src="/assets/icons/noun_Cross_2120375.svg"
              alt="Is not target of opportunity"
            />
          </div>
        </td>
      </tr>
      <tr>
        <th>Total time</th>
        <td>{{ proposal.generalInfo.totalRequestedTime }}</td>
      </tr>
    </tbody>
  </table>
</div>
