<wm-modal
  [title]="modalTitle"
  [loading]="loading"
  [isModalActive]="isModalActive"
  [error]="error"
  (closeModal)="closeModal()"
  (submitContent)="submitProposalStatus()"
  data-test="block-visit-status-modal"
>
  <div
    [formGroup]="proposalStatusForm"
    (ngSubmit)="submitProposalStatus()"
    class="p-0"
  >
    <div class="form-group input-section p-0">
      <label class="label">Proposal Status</label>
      <div class="control">
        <div class="select">
          <select formControlName="proposalStatus">
            <option
              *ngFor="let status of allowedProposalStatus"
              [value]="status"
            >
              {{ status }}
            </option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group input-section p-0">
      <label class="label">Proposal Status comment (optional)</label>
      <div class="control">
        <textarea
          class="textarea"
          formControlName="proposalStatusComment"
        ></textarea>
      </div>
    </div>
  </div>
</wm-modal>
