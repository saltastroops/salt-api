<div>
  <table class="table">
    <tr class="secondary-header">
      <th colspan="2" class="has-text-centered">Time Request</th>
    </tr>
    <tbody>
      <tr>
        <th>Requested Time</th>
        <td>{{requestedTime.totalRequestedTime}}</td>
      </tr>
      <tr>
        <th>Minimum Useful Time</th>
        <td>{{requestedTime.minimumUsefulTime}}</td>
      </tr>
      <tr class="secondary-header">
        <th colspan="2">Comments</th>
      </tr>
      <tr>
        <td colspan="2">
          <p
            *ngIf="requestedTime.comment; then comment; else noComment"
            [innerHTML]="requestedTime.comment | nl2br"
          ></p>
          <ng-template #comment>
            <p *ngIf="requestedTime.comment" [innerHTML]="requestedTime.comment | nl2br"></p>
          </ng-template>
          <ng-template #noComment>
            <p>None</p>
          </ng-template>
        </td>
      </tr>
    </tbody>
  </table>
</div>
