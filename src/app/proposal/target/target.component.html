<div class="table-container">
  <table class="table is-bordered">
    <thead>
      <tr class="has-text-centered secondary-header">
        <th colspan="6" class="has-text-centered">Target</th>
      </tr>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Equinox</th>
        <th>Magnitude</th>
        <th>RA</th>
        <th>Dec</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>{{ target.name }}</td>
        <td>{{ target.targetType }}</td>
        <td>{{ target.coordinates?.equinox }}</td>
        <td>
          {{ target.magnitude?.minimumMagnitude }} -
          {{ target.magnitude?.maximumMagnitude }}
          <span *ngIf="target.magnitude"
            >({{ target.magnitude.bandpass }})</span
          >
        </td>
        <td>{{ rightAscension }}</td>
        <td>{{ declination }}</td>
      </tr>
    </tbody>
  </table>
</div>
