<div class="login-form login-page">
  <div class="columns">
    <div class="column"></div>
    <div class="column">
      <h2 class="title is-3">Request Verification Link</h2>
      <form
        [formGroup]="requestLinkForm"
        (ngSubmit)="requestVerificationLink()"
      >
        <div class="input-section">
          <div class="form-group">
            <label class="label">Enter Your Username or Email</label>
            <input
              type="text"
              formControlName="usernameEmail"
              class="input"
              data-test="request-link-username-email"
            />
            <div
              *ngIf="
                (f.usernameEmail.dirty || submitted) && f.usernameEmail.errors
              "
              class="invalid-feedback"
            >
              <div
                *ngIf="f.usernameEmail.errors.required"
                class="has-text-danger"
                data-test="retyped-password-error"
              >
                This field cannot be empty
              </div>
            </div>
          </div>
        </div>
        <div class="input-section">
          <div class="form-group">
            <button
              class="button is-primary {{ loading ? 'is-loading' : '' }}"
              data-test="submit-request"
            >
              Request
            </button>
            <div *ngIf="error">
              <p class="has-text-danger" data-test="error">{{ error }}</p>
            </div>
            <div *ngIf="!error && successfull">
              <p class="has-text-info">
                Email with the verification link has been sent
              </p>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="column"></div>
  </div>
</div>
