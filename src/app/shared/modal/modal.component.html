<div class="p-0">
  <form class="modal" [ngClass]="isModalActive ? 'is-active' : ''">
    <div class="modal-background" (click)="close()"></div>
    <div class="modal-content">
      <div class="modal-card">
        <div>
          <header class="modal-card-head">
            <p class="modal-card-title">{{ title }}</p>
            <button
              class="delete"
              aria-label="close"
              (click)="close()"
            ></button>
          </header>
          <div class="modal-card-body">
            <ng-content></ng-content>
            <div *ngIf="error" class="invalid-feedback">
              <div class="has-text-danger" data-test="error">
                {{ error }}
              </div>
            </div>
          </div>
          <div class="modal-card-foot">
            <input
              type="submit"
              class="button is-small is-primary mr-3 pl-4"
              [ngClass]="{ 'is-loading': loading }"
              value="Submit"
              (click)="submit()"
              data-test="submit"
            />
            <input
              type="button"
              class="button is-small is-danger pl-4"
              value="Cancel"
              (click)="close()"
            />
          </div>
        </div>
      </div>
    </div>
    <button
      class="modal-close is-large"
      aria-label="close"
      (click)="close()"
    ></button>
  </form>
</div>
